<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<title>Funnel Talk</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="ekran-splash" class="ekran">
    <div id="splashAnimasyon"></div>
  </div>
  <!-- GİRİŞ EKRANI -->
  <div id="ekran-giris" class="ekran">
    <div class="giris-kutu">
      <h1>Sesli Oda</h1>
      <label>Adın</label>
      <input id="girisAd" type="text" placeholder="Adını yaz" maxlength="20" />
      <button id="btnDevam" class="buton-ana">Devam Et</button>

      <div id="googleGirisAlani" class="gizli">
        <div class="ayrac">veya</div>
        <button id="btnGoogleGiris" class="buton-google">Google ile Giriş Yap</button>
      </div>

      <p id="girisHata" class="hata-mesaji"></p>
    </div>
  </div>

  <!-- ANA UYGULAMA -->
  <div id="ekran-app" class="ekran gizli app-govde">
    <div class="kenar-cubugu">
      <div class="kullanici-bilgi">
        <span id="aktifKullaniciAd">-</span>
        <div class="kullanici-butonlari">
          <button id="btnAyarlar" class="buton-mini" title="Ayarlar">⚙️</button>
          <button id="btnCikisYap" class="buton-mini" title="Çıkış yap">⏻</button>
        </div>
      </div>
      <div class="kanal-baslik">KANALLAR</div>
      <div class="kanal-listesi" id="kanalListesi"></div>
    </div>

    <div class="ana-icerik">
      <div class="ust-bar">
        <span id="aktifKanalAdi">Bir kanal seç</span>
        <div class="ust-bar-sag">
          <button id="btnMikrofon" class="buton-ikon gizli" title="Mikrofonu kapat/aç">🎙️</button>
          <button id="btnEkranPaylas" class="buton-ikon gizli" title="Ekran paylaş">🖥️</button>
          <button id="btnSohbetAcKapat" class="buton-ikon" title="Sohbeti göster/gizle">💬</button>
          <button id="btnKanaldanAyril" class="buton-ikon gizli" title="Kanaldan ayrıl">🚪</button>
        </div>
      </div>

      <div class="govde">
        <div id="katilimcilar" class="katilimcilar"></div>

        <div id="yayinAlani" class="yayin-alani gizli">
          <video id="yayinVideo" autoplay playsinline></video>
          <button id="btnTamEkran" class="buton-tam-ekran" title="Tam ekran">⛶</button>
        </div>

        <div id="sohbetPaneli" class="sohbet-paneli gizli">
          <div id="sohbetMesajlari" class="sohbet-mesajlari"></div>
          <div class="sohbet-giris">
            <input id="sohbetInput" type="text" placeholder="Mesaj yaz..." maxlength="500" />
            <button id="btnSohbetGonder">Gönder</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- AYARLAR PENCERESİ -->
  <div id="ayarlarModal" class="modal gizli">
    <div class="modal-kutu ayarlar-kutu">
      <div class="ayarlar-sekmeler">
        <button class="sekme-btn aktif" data-sekme="donanim">Donanım</button>
        <button class="sekme-btn" data-sekme="gorunum">Görünüm</button>
        <button class="sekme-btn" data-sekme="kisayollar">Kısayollar</button>
      </div>
    
      <div class="sekme-icerik" data-icerik="donanim">
        <label>Mikrofon</label>
        <select id="ayarMikrofonSecim"></select>
      
        <label>Hoparlör</label>
        <select id="ayarHoparlorSecim"></select>
      
        <label>Ana ses seviyesi</label>
        <input id="ayarAnaSesSeviyesi" type="range" min="0" max="100" value="100" />
      </div>
    
      <div class="sekme-icerik gizli" data-icerik="gorunum">
        <label>Tema</label>
        <div class="tema-secenekleri">
          <button class="tema-secenek" data-tema="koyu">🌑 Koyu</button>
          <button class="tema-secenek" data-tema="acik">☀️ Açık</button>
          <button class="tema-secenek" data-tema="gece-mavisi">🌌 Gece Mavisi</button>
          <button class="tema-secenek" data-tema="mor">🟣 Mor</button>
        </div>
      </div>
    
      <div class="sekme-icerik gizli" data-icerik="kisayollar">
        <label>Mikrofon Aç/Kapat</label>
        <button id="kisayolMikrofonBtn" class="kisayol-btn">Atanmadı</button>
      
        <label>Yayını Durdur</label>
        <button id="kisayolYayinBtn" class="kisayol-btn">Atanmadı</button>
      
        <p class="ayarlar-not">Bu kısayollar uygulama arka plandayken (başka pencerede) de çalışır.</p>
      </div>
    
      <button id="btnAyarlarKapat" class="buton-ikincil ayarlar-kapat-btn">Kapat</button>
    </div>
  </div>
  <!-- EKRAN KAYNAĞI SEÇİM PENCERESİ -->
  <div id="kaynakSecimModal" class="modal gizli">
    <div class="modal-kutu">
      <h3>Neyi paylaşmak istersin?</h3>
      <div id="kaynakListesi" class="kaynak-listesi"></div>
      <button id="btnKaynakIptal" class="buton-ikincil">Vazgeç</button>
    </div>
  </div>
  <script src="lottie.min.js"></script>
  <script src="config.js"></script>
  <script src="livekit-client.umd.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
